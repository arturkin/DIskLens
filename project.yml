name: DiskLens

options:
  bundleIdPrefix: com.arturkin
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  DiskLensCore:
    path: Packages/DiskLensCore

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  DiskLens:
    type: application
    platform: macOS
    sources:
      - path: App
    dependencies:
      - package: DiskLensCore
      - target: disklens-helper
        embed: true
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arturkin.DiskLens
        PRODUCT_NAME: DiskLens
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: NO
        COMBINE_HIDPI_IMAGES: YES
        LSMINIMUMSYSTEMVERSION: "14.0"
        ENABLE_TESTABILITY: YES   # let DiskLensTests @testable import the app
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: DiskLens
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "Personal use"
        # We launch a bundled helper as root via an authorization prompt.
        NSAppleEventsUsageDescription: "DiskLens needs permission to run a privileged scan of the whole disk."
    entitlements:
      path: App/DiskLens.entitlements
      properties:
        com.apple.security.app-sandbox: false

  disklens-helper:
    type: tool
    platform: macOS
    sources:
      - path: Helper
    dependencies:
      - package: DiskLensCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arturkin.DiskLens.helper
        PRODUCT_NAME: disklens-helper

  DiskLensTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: DiskLens
      - package: DiskLensCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arturkin.DiskLensTests
        # Hosted in the app so tests can `@testable import DiskLens` and render
        # SwiftUI views (ImageRenderer) against the real view code.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DiskLens.app/Contents/MacOS/DiskLens"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DiskLens:
    build:
      targets:
        DiskLens: all
        disklens-helper: all
        DiskLensTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DiskLensTests
